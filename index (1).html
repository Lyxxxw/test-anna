<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real International | VIP Strategic Investment Cockpit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        :root {
            --brand-gold:#b0955b; --bg-cream:#f3eee4; --forest-green:#17433a;
            --sage-green:#99b2ac; --gray-text:#717375; --pure-white:#ffffff; --deep-black:#0a0a0b;
        }
        body { font-family:'Inter',sans-serif; background-color:var(--bg-cream); color:var(--deep-black); margin:0; padding:0; -webkit-font-smoothing:antialiased; }
        .nav-active { background-color:var(--forest-green); color:var(--pure-white)!important; box-shadow:0 10px 15px -3px rgba(23,67,58,0.3); font-weight:700; }
        .glass-card { background:rgba(255,255,255,0.98); border:1px solid rgba(176,149,91,0.2); box-shadow:0 4px 6px -1px rgba(0,0,0,0.05); border-radius:1.5rem; }
        .view-section { position:absolute; opacity:0; pointer-events:none; visibility:hidden; z-index:-1; width:100%; }
        .view-section.active { position:relative; opacity:1; pointer-events:auto; visibility:visible; z-index:1; animation:fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .loading-screen { position:fixed; inset:0; background:var(--bg-cream); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden">

<div id="loading-screen" class="loading-screen">
    <i class="fa-solid fa-circle-notch fa-spin text-3xl text-[#b0955b] mb-4"></i>
    <p class="text-sm font-bold text-[#17433a] uppercase tracking-widest">Verifying Identity...</p>
</div>

<div id="error-screen" class="loading-screen hidden">
    <p class="text-lg font-black text-[#17433a] mb-2">Access Denied</p>
    <p class="text-sm text-[#717375]">Invalid Client link or Token. Please contact Anna.</p>
</div>

<aside class="w-full md:w-80 bg-white border-r border-stone-200 flex flex-col z-30 shadow-2xl overflow-y-auto">
    <div class="p-8">
        <h1 class="text-[#17433a] font-black text-xl mb-10">REAL INTERNATIONAL</h1>
        <nav class="space-y-2">
            <button onclick="showSection('overview')" id="nav-overview" class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-xl text-sm nav-active">
                <i class="fa-solid fa-chart-line"></i> Portfolio Snapshot
            </button>
        </nav>
    </div>
    <div class="mt-auto p-8 border-t bg-stone-50">
        <p class="text-sm font-bold text-[#17433a]" id="client-name">Loading...</p>
        <p class="text-[10px] text-[#b0955b] font-black uppercase" id="client-tier"></p>
    </div>
</aside>

<main class="flex-1 overflow-y-auto p-10">
    <div id="section-overview" class="view-section active space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card p-6 border-b-4 border-[#b0955b]">
                <p class="text-[#717375] text-[11px] font-black uppercase">Active Principal</p>
                <p class="text-3xl font-bold text-[#17433a]" id="stat-principal">—</p>
            </div>
        </div>
        </div>
</main>

<script>
// ── 配置区域 ──────────────────────────────────────────────────
// 已替换为你刚才提供的新 URL
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzzn2ONt_0sdSgyyBLcRl66qErl-a3wGu4mp_FvnBIUp0vAWwv6OmtGVA4SKElVjwTQ/exec';
// 必须与你在 Apps Script 后端设置的 SECURITY_TOKEN 一致
const SECURITY_TOKEN = 'Real2026'; 

function showSection(id) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
    document.getElementById('section-' + id).classList.add('active');
}

async function loadDashboard() {
    const params = new URLSearchParams(window.location.search);
    const clientId = params.get('id');

    if (!clientId) {
        showError();
        return;
    }

    try {
        // 增加 token 参数进行身份验证
        const res = await fetch(`${APPS_SCRIPT_URL}?id=${clientId}&token=${SECURITY_TOKEN}`);
        const data = await res.json();

        if (data.error) {
            console.error(data.error);
            showError();
            return;
        }

        renderDashboard(data);
        document.getElementById('loading-screen').classList.add('hidden');

    } catch (err) {
        showError();
    }
}

function renderDashboard(data) {
    const c = data.client;
    document.getElementById('client-name').innerText = c.name || 'VIP Investor';
    document.getElementById('client-tier').innerText = c.tier || 'Private Client';
    
    const fmt = v => v ? '$' + Number(v).toLocaleString() : '—';
    document.getElementById('stat-principal').innerText = fmt(c.principal);
}

function showError() {
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('error-screen').classList.remove('hidden');
}

document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
