<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real International | VIP Strategic Investment Cockpit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --brand-gold:#b0955b; --bg-cream:#f3eee4; --forest-green:#17433a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-cream); margin: 0; overflow: hidden; }
        .nav-active { background-color: var(--forest-green); color: white !important; font-weight: 700; }
        .glass-card { background: rgba(255,255,255,0.98); border: 1px solid rgba(176,149,91,0.2); border-radius: 1.5rem; }
        .loading-screen { position: fixed; inset: 0; background: var(--bg-cream); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen">

<div id="loading-screen" class="loading-screen">
    <i class="fa-solid fa-circle-notch fa-spin text-3xl text-[#b0955b] mb-4"></i>
    <p id="status" class="text-xs font-bold text-[#17433a] uppercase tracking-widest text-center">Connecting to Real International Vault...</p>
</div>

<aside class="w-full md:w-80 bg-white border-r border-stone-200 flex flex-col z-30">
    <div class="p-8">
        <h1 class="text-2xl font-black text-[#17433a] mb-10">REAL <span class="text-[#b0955b]">INT'L</span></h1>
        <nav class="space-y-2">
            <button class="nav-btn w-full flex items-center gap-4 px-6 py-4 rounded-xl text-sm nav-active">
                <i class="fa-solid fa-chart-line w-5"></i> Portfolio Snapshot
            </button>
        </nav>
    </div>
</aside>

<main class="flex-1 overflow-y-auto p-10 space-y-8">
    <header class="flex justify-between items-end">
        <h2 class="text-3xl font-black text-[#0a0a0b] uppercase italic">Institutional <span class="text-[#b0955b]">Snapshot</span></h2>
        <div class="bg-[#17433a] px-8 py-5 rounded-2xl text-white">
            <p class="text-[#99b2ac] text-[10px] uppercase font-black">Active Principal</p>
            <p id="total-p" class="text-3xl font-bold font-mono text-[#b0955b]">$0</p>
        </div>
    </header>

    <div id="project-list" class="space-y-6">
        </div>
</main>

<script>
// 使用你最新的部署链接
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzzn2ONt_0sdSgyyBLcRl66qErl-a3wGu4mp_FvnBIUp0vAWwv6OmtGVA4SKElVjwTQ/exec';

async function loadData() {
    const params = new URLSearchParams(window.location.search);
    const clientId = params.get('id') || '317'; // 默认读取 317

    try {
        const res = await fetch(`${APPS_SCRIPT_URL}?id=${clientId}&token=Real2026`);
        const result = await res.json();
        
        if (result.allSheets && result.allSheets.holdings) {
            const holdings = result.allSheets.holdings;
            
            // 渲染项目列表
            document.getElementById('project-list').innerHTML = holdings.map(p => `
                <div class="glass-card p-8 border-l-8 border-[#b0955b] bg-white">
                    <div class="flex flex-col lg:flex-row gap-8 items-center">
                        <div class="lg:w-1/4">
                            <span class="text-[9px] font-black uppercase text-[#b0955b] bg-[#f3eee4] px-2 py-1 rounded">${p.type || 'ASSET'}</span>
                            <h4 class="text-xl font-black text-[#0a0a0b] mt-2">${p.project_name}</h4>
                            <p class="text-sm font-bold text-[#17433a]">$${Number(p.principal).toLocaleString()}</p>
                        </div>
                        <div class="lg:w-1/2 w-full">
                            <p class="text-[10px] font-bold text-[#717375] uppercase mb-2">Milestone: ${p.milestone3 || 'Active'}</p>
                            <div class="flex gap-1">
                                <div class="h-2 flex-1 rounded-full ${p.milestone1_status==='done'?'bg-[#17433a]':'bg-stone-200'}"></div>
                                <div class="h-2 flex-1 rounded-full ${p.milestone2_status==='done'?'bg-[#17433a]':'bg-stone-200'}"></div>
                                <div class="h-2 flex-1 rounded-full ${p.milestone3_status==='active'?'bg-[#b0955b]':'bg-stone-200'}"></div>
                            </div>
                        </div>
                        <div class="lg:w-1/4 text-right">
                             <p class="text-xs italic text-[#b0955b] font-bold">"${p.details || ''}"</p>
                        </div>
                    </div>
                </div>
            `).join('');

            // 计算总额
            const total = holdings.reduce((sum, h) => sum + Number(h.principal || 0), 0);
            document.getElementById('total-p').innerText = '$' + total.toLocaleString();

            document.getElementById('loading-screen').style.display = 'none';
        } else {
            document.getElementById('status').innerText = "ID " + clientId + " not found in Sheet.";
        }
    } catch (e) {
        document.getElementById('status').innerHTML = "<span class='text-red-600 font-bold italic'>Connection Denied. <br>Please update your Google Apps Script Deployment.</span>";
    }
}

window.onload = loadData;
</script>
</body>
</html>
